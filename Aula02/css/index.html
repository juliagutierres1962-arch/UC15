<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>cadastro</title>
</head>
<body>
    <h1>C A D A S T R O</h1>
    <form>
        <label for="nome">Nome:</label> <!-- label é o texto que aparece ao lado do campo de entrada -->
        <input type="text" id="nome" name="nome" required><br><br> <!-- input faz que usuario digite algo, required faz com que o campo: -->

        <label for="sobrenome">Sobrenome:</label>
        <input type="text" id="sobrenome" name="sobrenome" required><br><br>

        <label for="data de nascimento">Data de nascimento:</label>
        <input type="text" id="data de nascimento" name="data de nascimento" required><br><br>

        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="estado">Estado:</label>
        <input type="estado" id="estado" name="estado" required><br><br>

        <label for="senha">Senha:</label>
        <input type="senha" id="senha" name="senha" required><br><br>

        <button type="submit">criar conta</button>
        <p> Bcopy; teste cadastro</p>

    
</body>
</html>
